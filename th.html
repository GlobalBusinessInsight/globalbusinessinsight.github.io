        var lng = parseFloat(coords[0]);
        var lat = parseFloat(coords[1]);
        
        // 区分颜色：已投运（绿色），建设中（橙/黄色）
        var markerColor = station.status === '已投运' ? '#28a745' : '#ffc107';

        var circleMarker = L.circleMarker([lat, lng], {
            radius: 7, // 图钉大小
            fillColor: markerColor,
            color: '#ffffff',
            weight: 1.5,
            opacity: 1,
            fillOpacity: 0.9
        }).addTo(map);

        // 设置弹出气泡内容
        var popupContent = `
            <div style="font-size:14px; padding:5px;">
                <strong style="color:#0056b3; font-size:16px;">${station.name}</strong><br/>

        `;
