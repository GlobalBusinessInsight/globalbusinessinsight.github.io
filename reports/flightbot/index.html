<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flight Tracker</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background-color: #f4f7f6; }
        h1 { color: #333; }
        .tracker-section { margin-bottom: 20px; padding: 15px; border: 1px solid #ccc; border-radius: 5px; background: white; }
        .flight-card { border: 1px solid #ddd; padding: 10px; margin-top: 10px; border-radius: 4px; }
        .status-badge { display: inline-block; padding: 3px 8px; border-radius: 12px; font-size: 0.8em; font-weight: bold; }
        .status-scheduled { background: #3498db; color: white; }
        .status-active { background: #f1c40f; color: black; }
        .status-landed { background: #2ecc71; color: white; }
        .status-error { background: #e74c3c; color: white; }
        button { padding: 8px 15px; cursor: pointer; background: #3498db; color: white; border: none; border-radius: 3px; }
        button:hover { background: #2980b9; }
        .update-time { font-size: 0.8em; color: #888; }
        input[type="text"] { padding: 8px; margin-right: 10px; border: 1px solid #ccc; border-radius: 4px; }
    </style>
</head>
<body>
    <h1>✈️ Flight Tracker Dashboard</h1>
    <p class="update-time" id="last-updated">System syncing...</p>
    
    <div class="tracker-section" id="track-flight">
        <h2>1. Track by Flight Number (Today's Flights)</h2>
        <p><em>Currently monitoring selected flights (e.g. AA123, UA1, DL10)</em></p>
        <button onclick="loadFlightStatus()">Refresh Live Status</button>
        <div id="flight-status-results" style="margin-top: 15px;"></div>
    </div>

    <!-- Placeholders for future features -->
    <div class="tracker-section" style="opacity: 0.6;">
        <h2>2. Track by Airport (Coming Soon)</h2>
        <input type="text" placeholder="e.g., JFK" disabled>
        <button disabled>Track</button>
    </div>
    
    <div class="tracker-section" style="opacity: 0.6;">
        <h2>3. Track by Aircraft Registration (Coming Soon)</h2>
        <input type="text" placeholder="e.g., N12345" disabled>
        <button disabled>Track</button>
    </div>

    <script>
        async function loadFlightStatus() {
            const resultsDiv = document.getElementById('flight-status-results');
            resultsDiv.innerHTML = '<p>Fetching data from server...</p>';
            
            try {
                // Fetch the JSON generated by our backend agent
                const response = await fetch('flight_status.json?v=' + new Date().getTime()); 
                if (!response.ok) throw new Error('Network response was not ok');
                const data = await response.json();
                
                document.getElementById('last-updated').innerText = 'Last Backend Update: ' + new Date(data.last_updated).toLocaleString();
                
                let html = '';
                data.flights.forEach(f => {
                    html += `<div class="flight-card">`;
                    html += `<h3>Flight: ${f.carrier} ${f.number}</h3>`;
                    
                    if (f.result.status === 'error') {
                        html += `<p><span class="status-badge status-error">Status: Data Unavailable</span></p>`;
                        html += `<p style="color: #666; font-size: 0.9em;"><em>API Message: ${f.result.message}</em></p>`;
                    } else if (f.result.data && f.result.data.length > 0) {
                        const flightData = f.result.data[0];
                        html += `<p><strong>Departure:</strong> ${flightData.flightPoints[0].iataCode}</p>`;
                        html += `<p><strong>Arrival:</strong> ${flightData.flightPoints[flightData.flightPoints.length - 1].iataCode}</p>`;
                        html += `<p><strong>Scheduled Departure:</strong> ${flightData.flightPoints[0].departure.timings[0].value}</p>`;
                    } else {
                        html += `<p>No data available for today.</p>`;
                    }
                    html += `</div>`;
                });
                
                resultsDiv.innerHTML = html;
            } catch (error) {
                resultsDiv.innerHTML = `<p style="color:red;">Failed to load flight status data: ${error.message}</p>`;
            }
        }

        // Auto-load on page start
        window.onload = loadFlightStatus;
    </script>
</body>
</html>
