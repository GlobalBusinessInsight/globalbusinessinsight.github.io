<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Global Green Infrastructure Map</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; line-height: 1.6; color: #333; max-width: 1200px; margin: 0 auto; padding: 20px; background: #f4f7f6; }
        header { background: #2d5a27; color: white; padding: 40px; text-align: center; border-radius: 8px; margin-bottom: 30px; }
        .map-section { background: #fff; padding: 30px; border-radius: 8px; margin-bottom: 40px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .map-placeholder { width: 100%; height: 600px; background: #e0e0e0; position: relative; border-radius: 8px; overflow: hidden; display: flex; align-items: center; justify-content: center; color: #666; font-weight: bold; border: 1px solid #ccc; }
        .dot { position: absolute; width: 15px; height: 15px; border-radius: 50%; background: #27ae60; cursor: pointer; border: 2px solid white; box-shadow: 0 0 5px rgba(0,0,0,0.3); transition: transform 0.2s; }
        .dot:hover { transform: scale(1.5); background: #2ecc71; }
        .dot:hover::after { content: attr(data-info); position: absolute; background: #333; color: #fff; padding: 10px; border-radius: 4px; width: 250px; bottom: 25px; left: 50%; transform: translateX(-50%); z-index: 10; font-size: 14px; white-space: normal; line-height: 1.4; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        footer { text-align: center; margin-top: 50px; color: #999; font-size: 0.9em; border-top: 1px solid #eee; padding-top: 20px; }
    </style>
</head>
<body>

<header>
    <h1>Global Green Infrastructure Intelligence Map</h1>
    <p>实时追踪全球绿色基建项目与环保政策动态</p>
</header>

<section class="map-section">
    <div class="map-placeholder">
        <span style="font-size: 150px; opacity: 0.05;">GLOBAL MAP</span>
        
        <!-- Case Points -->
        <div class="dot" style="top: 35%; left: 48%;" data-info="德国：三一电动搅拌车在柏林低排放区(LEZ)的大规模交付项目"></div>
        <div class="dot" style="top: 48%; left: 58%;" data-info="沙特：NEOM 新城绿色能源驱动的自动化港口基建"></div>
        <div class="dot" style="top: 68%; left: 78%;" data-info="印尼：柳工电动装载机助力 Merauke 粮食基地低碳运营"></div>
        <div class="dot" style="top: 78%; left: 88%;" data-info="澳大利亚：Fortescue 金属集团与徐工合作的零排放智慧矿山"></div>
        <div class="dot" style="top: 42%; left: 22%;" data-info="北美：卡特彼勒为西海岸绿色数据中心提供的氢能发电机组"></div>
        <div class="dot" style="top: 55%; left: 15%;" data-info="巴西：三一重工雅库伊工厂扩建，旨在打造拉美绿色制造枢纽"></div>
        <div class="dot" style="top: 25%; left: 42%;" data-info="英国：HS2 高铁项目中的零排放挖掘作业示范区"></div>
    </div>
    <p style="text-align: center; color: #888; font-style: italic; margin-top: 15px;">* 悬停圆点查看具体区域绿色基建情报详情</p>
</section>

<footer>
    <p>&copy; 2026 Global Business Insight - Green Infrastructure Division. Powered by Eric.</p>
</footer>

</body>
</html>
